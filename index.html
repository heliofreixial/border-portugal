<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f0f0ee;color:#1a1a18;min-height:100vh}
.w{max-width:480px;margin:0 auto;padding:14px}
.hdr{background:#1a3a6b;border-radius:14px;padding:15px 16px;text-align:center;color:#fff;margin-bottom:13px}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:2px}
.hdr p{font-size:11px;opacity:.8}
.prog{display:flex;gap:4px;margin-bottom:13px}
.pd{height:4px;flex:1;border-radius:2px;background:#d0d0cc}
.pd.on{background:#1a3a6b}
.pd.now{background:#4a8ad4}
.card{background:#fff;border-radius:14px;padding:17px 15px;margin-bottom:11px;border:1.5px solid #e0e0da}
.card h2{font-size:16px;font-weight:700;margin-bottom:4px}
.card p{font-size:13px;color:#6a6a65;margin-bottom:13px;line-height:1.5}
.chip{font-size:40px;text-align:center;margin:6px 0 2px}
.clabel{text-align:center;font-size:12px;color:#888;margin-bottom:12px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#f8f8f6;border:1.5px solid #e0e0da;border-radius:12px;padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:11px;-webkit-user-select:none;user-select:none}
.opt:active{background:#e8eef8;border-color:#1a3a6b}
.oi{font-size:23px;flex-shrink:0;width:30px;text-align:center}
.ot{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.3}
.os{font-size:11px;color:#6a6a65;margin-top:2px;line-height:1.3}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.lbtn{background:#fff;border:1.5px solid #e0e0da;border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;-webkit-user-select:none;user-select:none}
.lbtn:active,.lbtn.sel{border-color:#1a3a6b;background:#e8eef8}
.lf{font-size:26px;display:block;margin-bottom:4px}
.ln{font-size:10px;font-weight:600;color:#2a2a28;line-height:1.2}
.btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#5a5a56;margin-top:8px;-webkit-user-select:none}
.btn:active{opacity:.75}
.btnp{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.btn2{display:flex;gap:8px;margin-top:10px}
.btn2 .btn{margin-top:0;flex:1}
/* result */
.rc{background:#fff;border-radius:14px;padding:17px 15px;border:2px solid #1a3a6b;margin-bottom:11px}
.rt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1a3a6b;margin-bottom:12px}
.rs{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.rn{width:27px;height:27px;border-radius:50%;background:#1a3a6b;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ra{font-size:15px;font-weight:700;line-height:1.3}
.rd{font-size:12px;color:#5a5a56;margin-top:2px;line-height:1.4}
.eq{border-radius:11px;padding:12px 13px;display:flex;align-items:center;gap:12px;margin:10px 0;flex-wrap:wrap}
.eq-g{background:#e8f4e8;border:1.5px solid #6abf6a}
.eq-b{background:#e6f1fb;border:1.5px solid #7ab8e8}
.eq-a{background:#fce9c0;border:1.5px solid #e0a020}
.eq-r{background:#fde8e8;border:1.5px solid #e07070}
.eqi{width:72px;height:50px;object-fit:cover;border-radius:7px;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.eqt{font-size:15px;font-weight:700;line-height:1.3}
.eq-g .eqt{color:#0e5c30}
.eq-b .eqt{color:#0a3870}
.eq-a .eqt{color:#7a4200}
.eq-r .eqt{color:#700000}
.eqs{font-size:12px;margin-top:2px;line-height:1.4;opacity:.85}
.qb{display:inline-block;color:#fff;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;margin-top:8px}
.qb-eu{background:#0e5c30}
.qb-all{background:#185fa5}
.al-m{background:#fff3cd;border:1.5px solid #ffc107;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#5a3e00}
.al-i{background:#e6f1fb;border:1.5px solid #7ab8e8;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#0a3870}
.al-w{background:#fde8e8;border:1.5px solid #e07070;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#700000}
.hidden{display:none}
/* ── COUNTRY SEARCH ── */
.srch-wrap{position:relative;margin-bottom:10px}
.srch-input{width:100%;padding:12px 40px 12px 40px;font-size:15px;border:1.5px solid #ddd;border-radius:12px;background:#fff;color:#1a1a18;outline:none;-webkit-appearance:none}
.srch-input:focus{border-color:#1a3a6b}
.srch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.srch-clear{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:17px;color:#aaa;cursor:pointer;background:none;border:none;padding:4px;display:none}
.srch-results{background:#fff;border:1.5px solid #e0e0da;border-radius:12px;overflow:hidden;margin-top:4px}
.srch-item{padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0ee}
.srch-item:last-child{border-bottom:none}
.srch-item:active{background:#e8eef8}
.srch-flag{font-size:22px;flex-shrink:0}
.srch-name{font-size:14px;font-weight:600;color:#1a1a18}
.srch-route{font-size:11px;color:#6a6a65;margin-top:1px}
.srch-empty{padding:16px;text-align:center;font-size:13px;color:#888}
</style>
</head>

function normalizeSearch(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').trim();
}

function searchCountries(q){
  if(!q||q.length<2) return [];
  var nq=normalizeSearch(q);
  return COUNTRIES.filter(function(c){
    return c.names.some(function(n){ return normalizeSearch(n).indexOf(nq)>=0; });
  }).slice(0,6);
}

function getRouteLabel(r){
  var tx=TX[L]||TX.en;
  if(r.doc==='ue') return (tx.deg||'E-gate/RAPID')+' · '+(tx.qeu||'EU queue');
  if(r.doc==='tc' && r.chip==='y'){
    // Para entrada (default)
    if(r.nat_ent==='ee') return 'SSK → '+(tx.deg||'E-gate')+' ('+(tx.ent||'entry')+') · SSK → '+(tx.deg||'E-gate')+' ('+(tx.sai||'exit')+')';
    if(r.nat_ent==='be') return 'SSK → '+(tx.deg||'E-gate')+' ('+(tx.sai||'exit')+') · SSK → '+(tx.dbo||'Box')+' ('+(tx.ent||'entry')+')';
    return 'SSK → '+(tx.dbo||'Box')+' · '+(tx.qal||'All passports');
  }
  return tx.dbo||'Manual counter';
}

function pickCountry(idx){
  var c=COUNTRIES[idx];
  var r=c.route;
  // Pré-preencher o estado e ir para o resultado
  S={};H=[];
  S.dir='ent'; H.push('dir_ent');
  S.doc=r.doc; H.push('doc_'+r.doc);
  if(r.doc==='tc'){
    S.chip=r.chip; H.push('chip_'+r.chip);
    if(r.chip==='y'&&r.nat_ent){
      S.nat=r.nat_ent; H.push('nat_'+r.nat_ent);
    }
  }
  S.min='n'; H.push('min_n');
  showResult();
}

function showLang(){
  document.body.style.direction=L==='ar'?'rtl':'ltr';
  prog(0);
  var h='<div class="card"><h2>'+t('ls')+'</h2><div style="height:8px"></div><div class="lgrid">';
  LANGS.forEach(function(l){
    h+='<div class="lbtn'+(L===l.c?' sel':'')+'" data-lang="'+l.c+'"><span class="lf">'+l.f+'</span><span class="ln">'+l.n+'</span></div>';
  });
  h+='</div></div>';
  h+='<button class="btn btnp" id="btn-go">'+t('go')+'</button>';
  // Search bar
  h+='<div style="margin-top:14px"><div class="srch-wrap">';
  h+='<span class="srch-icon">🔍</span>';
  h+='<input class="srch-input" id="csrch" type="search" placeholder="🌍 '+(TX[L]||TX.en).srch_ph+'" autocomplete="off" autocorrect="off" spellcheck="false">';
  h+='<button class="srch-clear" id="csrch-clr">✕</button>';
  h+='</div>';
  h+='<div id="csrch-res" class="srch-results" style="display:none"></div>';
  h+='</div>';
  set(h);
  // Listeners lang
  document.querySelectorAll('.lbtn').forEach(function(el){
    el.addEventListener('click', function(){ pickLang(this.getAttribute('data-lang')); });
  });
  var bg=document.getElementById('btn-go');
  if(bg) bg.addEventListener('click', startFlow);
  // Listeners search
  var si=document.getElementById('csrch');
  var sr=document.getElementById('csrch-res');
  var sc=document.getElementById('csrch-clr');
  if(si){
    si.addEventListener('input',function(){
      var q=si.value.trim();
      sc.style.display=q?'block':'none';
      var hits=searchCountries(q);
      if(!q||!hits.length){sr.style.display='none';sr.innerHTML='';return;}
      sr.innerHTML=hits.map(function(c,i){
        return '<div class="srch-item" data-ci="'+COUNTRIES.indexOf(c)+'">'
          +'<span class="srch-flag">'+c.flag+'</span>'
          +'<div><div class="srch-name">'+c.names[0]+'</div>'
          +'<div class="srch-route">'+getRouteLabel(c.route)+'</div></div></div>';
      }).join('');
      sr.style.display='block';
      sr.querySelectorAll('.srch-item').forEach(function(el){
        el.addEventListener('click',function(){pickCountry(+this.getAttribute('data-ci'));});
        el.addEventListener('touchend',function(e){e.preventDefault();pickCountry(+this.getAttribute('data-ci'));});
      });
    });
    si.addEventListener('keydown',function(e){if(e.key==='Enter'){si.blur();}});
    if(sc) sc.addEventListener('click',function(){si.value='';sr.style.display='none';sr.innerHTML='';sc.style.display='none';});
  }
}

function pickLang(code){ L=code; document.body.style.direction=L==='ar'?'rtl':'ltr'; showLang(); }

function startFlow(){ S={}; H=[]; showStep('dir'); }

function showStep(id){
  var step=STEPS.indexOf(id);
  prog(step);
  var h='';
  if(id==='dir'){
    h='<div class="card"><h2>'+t('qd')+'</h2><p>'+t('qs')+'</p><div class="opts">'+
      opt('✈️',t('ent'),t('ents'),'dir_ent')+
      opt('🛫',t('sai'),t('sais'),'dir_sai')+
      opt('🔁',t('tra'),t('tras'),'dir_tra')+
      '</div></div>';
  } else if(id==='doc'){
    h='<div class="card"><h2>'+t('qdc')+'</h2><p>'+t('qdcs')+'</p><div class="opts">'+
      opt('🇪🇺',t('due'),t('dues'),'doc_ue')+
      opt('🪪',t('dre'),t('dres'),'doc_re')+
      opt('👨‍👩‍👧',t('dfa'),t('dfas'),'doc_fa')+
      opt('🌍',t('dtc'),t('dtcs'),'doc_tc')+
      opt('🎖️',t('ddi'),t('ddis'),'doc_di')+
      opt('🆘',t('das'),t('dass'),'doc_as')+
      '</div></div>';
  } else if(id==='fam'){
    h='<div class="card"><h2>'+t('qfc')+'</h2><p>'+t('qfcs')+'</p><div class="opts">'+
      opt('🪪',t('fy'),null,'fam_y')+
      opt('🌍',t('fn'),null,'fam_n')+
      '</div></div>';
  } else if(id==='chip'){
    h='<div class="card"><h2>'+t('qch')+'</h2><p>'+t('qchs')+'</p>'+
      '<div class="chip"><img src="'+IMG_CHIP+'" style="width:40px;height:40px;object-fit:contain;display:block;margin:0 auto"></div><div class="clabel">'+t('chl')+'</div>'+
      '<div class="opts">'+
      opt('✅',t('cy'),null,'chip_y')+
      opt('❌',t('cn'),null,'chip_n')+
      '</div></div>';
  } else if(id==='nat'){
    var dir=S.dir||'ent';
    var o='';
    if(dir==='tra'){
      o=opt('✈️',t('nti'),t('ntis'),'nat_ti')+opt('🛂',t('nts'),t('ntss'),'nat_ts');
    } else if(dir==='ent'){
      o=opt('🚀',t('nee'),t('nees'),'nat_ee')+opt('🌍',t('nbe'),t('nbes'),'nat_be');
    } else {
      o=opt('🚀',t('nes'),t('ness'),'nat_es')+opt('🌍',t('nbs'),t('nbss'),'nat_bs');
    }
    h='<div class="card"><h2>'+t('qna')+'</h2><p>'+t('qnas')+'</p><div class="opts">'+o+'</div></div>';
  } else if(id==='minor'){
    h='<div class="card"><h2>'+t('qmi')+'</h2><p>'+t('qmis')+'</p><div class="opts">'+
      opt('👶',t('my'),null,'min_y')+
      opt('🧍',t('mn'),null,'min_n')+
      '</div></div>';
  }
  if(H.length>0) h+='<button class="btn" id="btn-back">'+t('bk')+'</button>';
  set(h);
  // Listeners após set()
  document.querySelectorAll('.opt').forEach(function(el){
    el.addEventListener('click', function(){ pick(this.getAttribute('data-val')); });
  });
  var bb=document.getElementById('btn-back');
  if(bb) bb.addEventListener('click', goBack);
}

function pick(val){
  H.push(val);
  // Parse val
  var p=val.split('_');
  var k=p[0], v=p[1]+(p[2]?'_'+p[2]:'');
  S[k]=v;
  // Decide next step
  var next=nextStep(k,v);
  if(next==='result') showResult();
  else showStep(next);
}

function nextStep(k,v){
  if(k==='dir'){
    if(v==='tra') return 'doc'; // transit still needs doc? No — go to nat directly for transit
    return 'doc';
  }
  if(k==='doc'){
    if(v==='tc') return 'chip';
    if(v==='fa') return 'fam';
    if(v==='ue') return 'minor';
    return 'result';
  }
  if(k==='fam') return 'minor';
  if(k==='chip') return v==='n'?'result':'nat';
  if(k==='nat'){
    if(v==='ti') return 'result'; // transit international — no minor question needed
    return 'minor';
  }
  if(k==='min') return 'result';
  return 'result';
}

// Special: for transit, skip doc and go to nat directly
// Actually let's keep doc for transit Schengen case
// But simplify: dir_tra -> nat directly (ask transit type)
var _origNextStep=nextStep;
nextStep=function(k,v){
  if(k==='dir' && v==='tra') return 'nat';
  return _origNextStep(k,v);
};

function goBack(){
  if(H.length===0){showLang();return;}
  H.pop();
  S={};
  // Replay history
  H.forEach(function(val){
    var p=val.split('_'); S[p[0]]=p[1]+(p[2]?'_'+p[2]:'');
  });
  // Find current step
  var cur='dir';
  for(var i=0;i<H.length;i++){
    var p=H[i].split('_');
    cur=nextStep(p[0], p[1]+(p[2]?'_'+p[2]:''));
  }
  if(H.length===0) showStep('dir');
  else showStep(cur);
}

/* ── Result ── */
function eqImg(type){
  if(type==='eg') return '<img class="eqi" src="'+IMG_EG+'" alt="e-gate">';
  if(type==='sk') return '<img class="eqi" src="'+IMG_SSK+'" alt="SSK">';
  if(type==='bx') return '<img class="eqi" src="'+IMG_BOX+'" alt="Box">';
  if(type==='sk_eg') return '<img class="eqi" src="'+IMG_SSK+'" alt="SSK"><span style="font-size:20px;margin:0 6px">→</span><img class="eqi" src="'+IMG_EG+'" alt="e-gate">';
  if(type==='sk_bx') return '<img class="eqi" src="'+IMG_SSK+'" alt="SSK"><span style="font-size:20px;margin:0 6px">→</span><img class="eqi" src="'+IMG_BOX+'" alt="Box">';
  return '<span style="font-size:36px">✈️</span>';
}

function step(n,a,d){ return '<div class="rs"><div class="rn">'+n+'</div><div><div class="ra">'+a+'</div><div class="rd">'+d+'</div></div></div>'; }

function showResult(){
  prog(STEPS.length);
  var dir=S.dir||'ent', doc=S.doc||'', chip=S.chip||'', nat=S.nat||'', fam=S.fam||'', minor=S.min||'n';
  var steps='', eq='', qb='', alerts='';

  // Minor alerts
  if(minor==='y'){
    if(dir==='sai') alerts+='<div class="al-m">'+t('ams')+'</div>';
    else alerts+='<div class="al-m">'+t('ame')+'</div>';
  }

  // TRANSIT INTERNATIONAL
  if(nat==='ti'){
    steps=step(1,t('s1bo'),t('s1bod'));
    eq='<div class="eq eq-b">'+eqImg('bd')+'<div><div class="eqt">'+t('dbd')+'</div><div class="eqs">'+t('dbds')+'</div></div></div>';
  }
  // ASILO
  else if(doc==='as'){
    steps=step(1,t('s1au'),t('s1aud'));
    eq='<div class="eq eq-r">'+eqImg('bx')+'<div><div class="eqt">'+t('dau')+'</div><div class="eqs">'+t('daus')+'</div></div></div>';
    alerts+='<div class="al-w">'+t('aas')+'</div>';
  }
  // DIPLOMÁTICO
  else if(doc==='di'){
    steps=step(1,t('s1b'),t('s1bd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
  }
  // UE
  else if(doc==='ue'){
    if(minor==='y'){
      steps=step(1,t('s1eu'),t('s1eud'));
      eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    } else {
      steps=step(1,t('s1e'),t('s1ed'));
      eq='<div class="eq eq-g">'+eqImg('eg')+'<div><div class="eqt">'+t('deg')+'</div><div class="eqs">'+t('degs')+'</div></div></div>';
    }
    qb='<div class="qb qb-eu">'+t('qeu')+'</div>';
  }
  // RESIDÊNCIA
  else if(doc==='re'){
    steps=step(1,t('s1b'),t('s1bd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
  }
  // FAMILIAR
  else if(doc==='fa'){
    if(fam==='y'){
      steps=step(1,t('s1eu'),t('s1eud'));
      eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
      qb='<div class="qb qb-eu">'+t('qeu')+'</div>';
    } else {
      steps=step(1,t('s1s'),t('s1sd'))+step(2,t('s2b'),t('s2bd'));
      eq='<div class="eq eq-a">'+eqImg('sk_bx')+'<div><div class="eqt">'+t('dsb')+'</div><div class="eqs">'+t('dsbs')+'</div></div></div>';
      qb='<div class="qb qb-all">'+t('qal')+'</div>';
    }
  }
  // TCE sem chip
  else if(doc==='tc' && chip==='n'){
    steps=step(1,t('s1b'),t('s1bd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
    alerts+='<div class="al-i">'+t('anc')+'</div>';
  }
  // TCE com chip — e-gate
  else if(doc==='tc' && (nat==='ee'||nat==='es')){
    var isExit=(dir==='sai');
    if(minor==='y'){
      steps=step(1,isExit?t('s1se'):t('s1s'),isExit?t('s1sed'):t('s1sd'))+step(2,t('s2b'),t('s2bd'));
      eq='<div class="eq eq-a">'+eqImg('sk_bx')+'<div><div class="eqt">'+t('dsb')+'</div><div class="eqs">'+t('dsbs')+'</div></div></div>';
      qb='<div class="qb qb-all">'+t('qal')+'</div>';
    } else {
      steps=step(1,isExit?t('s1se'):t('s1s'),isExit?t('s1sed'):t('s1sd'))+step(2,t('s2e'),t('s2ed'));
      eq='<div class="eq eq-g">'+eqImg('sk_eg')+'<div><div class="eqt">'+t('dsg')+'</div><div class="eqs">'+t('dsgs')+'</div></div></div>';
    }
  }
  // TCE com chip — balcão / trânsito Schengen
  else {
    var isExit2=(dir==='sai');
    steps=step(1,isExit2?t('s1se'):t('s1s'),isExit2?t('s1sed'):t('s1sd'))+step(2,t('s2b'),t('s2bd'));
    eq='<div class="eq eq-a">'+eqImg('sk_bx')+'<div><div class="eqt">'+t('dsb')+'</div><div class="eqs">'+t('dsbs')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
  }

  var h='<div class="rc"><div class="rt">'+t('yr')+'</div>'+steps+eq+qb+alerts+'</div>';
  h+='<div class="btn2"><button class="btn" id="btn-back2">'+t('bk')+'</button><button class="btn btnp" id="btn-restart">'+t('br')+'</button></div>';
  set(h);
  var bb2=document.getElementById('btn-back2');
  var br2=document.getElementById('btn-restart');
  if(bb2) bb2.addEventListener('click', function(){ H.length>0 ? goBack() : showLang(); });
  if(br2) br2.addEventListener('click', restart);
}

function restart(){ S={}; H=[]; showLang(); }

function prog(n){
  var tot=STEPS.length+1, h='';
  for(var i=0;i<tot;i++) h+='<div class="pd'+(i<n?' on':i===n?' now':'')+'"></div>';
  document.getElementById('prog').innerHTML=h;
}

function set(h){ document.getElementById('app').innerHTML=h; window.scrollTo(0,0); }

showLang();
</script>
