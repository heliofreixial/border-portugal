<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f0f0ee;color:#1a1a18;min-height:100vh}
.w{max-width:480px;margin:0 auto;padding:14px}
.hdr{background:#1a3a6b;border-radius:14px;padding:15px 16px;text-align:center;color:#fff;margin-bottom:13px}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:2px}
.hdr p{font-size:11px;opacity:.8}
/* Progress */
.prog{display:flex;gap:4px;margin-bottom:13px}
.pd{height:4px;flex:1;border-radius:2px;background:#d0d0cc}
.pd.on{background:#1a3a6b}
.pd.now{background:#4a8ad4}
/* Card */
.card{background:#fff;border-radius:14px;padding:17px 15px;margin-bottom:11px;border:1.5px solid #e0e0da}
.card h2{font-size:16px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card p{font-size:13px;color:#6a6a65;margin-bottom:13px;line-height:1.5}
/* Options */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#f8f8f6;border:1.5px solid #e0e0da;border-radius:12px;padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:11px;-webkit-user-select:none;user-select:none;touch-action:manipulation;-webkit-touch-callout:none}
.opt:active{background:#e8eef8;border-color:#1a3a6b}
.oi{font-size:23px;flex-shrink:0;width:30px;text-align:center}
.ot{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.3}
.os{font-size:11px;color:#6a6a65;margin-top:2px;line-height:1.3}
/* Language grid */
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.lbtn{background:#fff;border:1.5px solid #e0e0da;border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;-webkit-user-select:none;user-select:none}
.lbtn:active,.lbtn.sel{border-color:#1a3a6b;background:#e8eef8}
.lf{font-size:26px;display:block;margin-bottom:4px}
.ln{font-size:10px;font-weight:600;color:#2a2a28;line-height:1.2}
/* Buttons */
.btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#5a5a56;margin-top:8px;-webkit-user-select:none;user-select:none}
.btn:active{opacity:.75}
.btnp{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.btn2{display:flex;gap:8px;margin-top:10px}
.btn2 .btn{margin-top:0;flex:1}
/* Country search */
.srch{position:relative;margin-bottom:10px}
.srch input{width:100%;padding:12px 36px 12px 40px;font-size:16px;border:1.5px solid #ddd;border-radius:12px;background:#fff;color:#1a1a18;outline:none;-webkit-appearance:none}
.srch input:focus{border-color:#1a3a6b}
.srch .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.srch .sc{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:17px;color:#aaa;cursor:pointer;background:none;border:none;padding:4px;display:none}
.srch-res{background:#fff;border:1.5px solid #e0e0da;border-radius:12px;overflow:hidden;margin-top:4px;display:none}
.sri{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0ee}
.sri:last-child{border-bottom:none}
.sri:active{background:#e8eef8}
.sri-fl{font-size:22px;flex-shrink:0}
.sri-name{font-size:14px;font-weight:600;color:#1a1a18}
.sri-sub{font-size:11px;color:#6a6a65;margin-top:1px}
.srch-empty{padding:16px;text-align:center;font-size:13px;color:#888}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
.b-sch{background:#d4edda;color:#155724}
.b-eu{background:#cce5ff;color:#004085}
.b-no{background:#f8d7da;color:#721c24}
/* Chip */
.chip-img{display:block;margin:8px auto 4px;width:40px;height:40px;object-fit:contain}
.clabel{text-align:center;font-size:12px;color:#888;margin-bottom:12px}
/* Result */
.rc{background:#fff;border-radius:14px;padding:17px 15px;border:2px solid #1a3a6b;margin-bottom:11px}
.rt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1a3a6b;margin-bottom:12px}
.rstep{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.rn{width:27px;height:27px;border-radius:50%;background:#1a3a6b;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ra{font-size:15px;font-weight:700;color:#1a1a18;line-height:1.3}
.rd{font-size:12px;color:#5a5a56;margin-top:2px;line-height:1.4}
.eq{border-radius:11px;padding:12px 13px;display:flex;align-items:center;gap:12px;margin:10px 0;flex-wrap:wrap}
.eq-g{background:#e8f4e8;border:1.5px solid #6abf6a}
.eq-b{background:#e6f1fb;border:1.5px solid #7ab8e8}
.eq-a{background:#fce9c0;border:1.5px solid #e0a020}
.eq-r{background:#fde8e8;border:1.5px solid #e07070}
.eq-gr{background:#f0f0ee;border:1.5px solid #aaa}
.eqi{width:72px;height:50px;object-fit:cover;border-radius:7px;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.eqt{font-size:15px;font-weight:700;line-height:1.3}
.eq-g .eqt{color:#0e5c30}
.eq-b .eqt{color:#0a3870}
.eq-a .eqt{color:#7a4200}
.eq-r .eqt{color:#700000}
.eq-gr .eqt{color:#3a3a3a}
.eqs{font-size:12px;margin-top:2px;line-height:1.4;opacity:.85}
.qb{display:inline-block;color:#fff;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;margin-top:8px}
.qb-eu{background:#0e5c30}
.qb-all{background:#185fa5}
.qb-crew{background:#5a5a56}
.al-m{background:#fff3cd;border:1.5px solid #ffc107;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#5a3e00}
.al-i{background:#e6f1fb;border:1.5px solid #7ab8e8;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#0a3870}
.al-w{background:#fde8e8;border:1.5px solid #e07070;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#700000}
.al-g{background:#e8f4e8;border:1.5px solid #6abf6a;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:9px;line-height:1.55;color:#0e5c30}
.no-border-info{background:#fff;border-radius:14px;padding:20px 15px;border:2px solid #6abf6a;margin-bottom:11px;text-align:center}
.no-border-icon{font-size:48px;margin-bottom:10px}
.no-border-title{font-size:18px;font-weight:700;color:#0e5c30;margin-bottom:6px}
.no-border-sub{font-size:13px;color:#2a6a40;line-height:1.5}

</style>
</head>

/* ─── Helpers ─── */
function t(k){ var tx=TX[L]||TX.en; return tx[k]!==undefined?tx[k]:k; }
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').trim(); }
function set(h){ document.getElementById('app').innerHTML=h; window.scrollTo(0,0); }

function langName(c){
  var m={pt:'pt',br:'pt',fr:'fr',es:'es',de:'de',it:'it',zh:'zh',ar:'ar',hi:'hi',ru:'ru'};
  var k=m[L]||'en';
  return c[k]||c.en;
}

/* ─── Pesquisa de países ─── */
function searchCountries(q){
  if(!q||q.length<2) return [];
  var nq=norm(q);
  return COUNTRIES.filter(function(c){
    var fields=[c.en,c.pt,c.fr,c.es,c.de,c.it,c.zh,c.ar,c.hi,c.ru];
    return fields.some(function(n){ return norm(n).indexOf(nq)>=0; });
  }).slice(0,7);
}

function countryBadge(c){
  if(c.sch) return '<span class="badge b-sch">Schengen</span>';
  if(c.eu)  return '<span class="badge b-eu">EU</span>';
  return '';
}

/* ─── Componente de pesquisa reutilizável ─── */
function mkSearch(inputId, resId, clearId, ph, onPick){
  var si=document.getElementById(inputId);
  var sr=document.getElementById(resId);
  var sc=document.getElementById(clearId);
  if(!si) return;
  var hasTouch=('ontouchstart' in window);

  function run(){
    var q=si.value.trim();
    sc.style.display=q?'block':'none';
    var hits=searchCountries(q);
    if(!q||!hits.length){ sr.style.display='none'; sr.innerHTML=''; return; }
    sr.innerHTML=hits.map(function(c){
      return '<div class="sri" data-ci="'+COUNTRIES.indexOf(c)+'">'+
        '<span class="sri-fl">'+c.f+'</span>'+
        '<div><div class="sri-name">'+langName(c)+countryBadge(c)+'</div></div></div>';
    }).join('');
    sr.style.display='block';
    // Usar touchend em dispositivos touch, click em desktop
    // Nunca os dois juntos para evitar double-fire no iOS
    sr.querySelectorAll('.sri').forEach(function(el){
      if(hasTouch){
        var startY=0;
        el.addEventListener('touchstart',function(e){ startY=e.touches[0].clientY; },{passive:true});
        el.addEventListener('touchend',function(e){
          // Ignorar se foi scroll (movimento > 10px)
          if(Math.abs(e.changedTouches[0].clientY - startY) > 10) return;
          e.preventDefault();
          onPick(COUNTRIES[+this.getAttribute('data-ci')]);
        });
      } else {
        el.addEventListener('click',function(){
          onPick(COUNTRIES[+this.getAttribute('data-ci')]);
        });
      }
    });
  }

  // 'input' é suficiente — cobre todos os browsers incluindo iOS Safari
  si.addEventListener('input', run);
  si.addEventListener('keydown',function(e){ if(e.key==='Enter'){ si.blur(); run(); } });

  // Botão limpar
  if(sc){
    sc.addEventListener('click',function(){ si.value=''; sr.style.display='none'; sr.innerHTML=''; sc.style.display='none'; si.focus(); });
    if(hasTouch) sc.addEventListener('touchend',function(e){ e.preventDefault(); si.value=''; sr.style.display='none'; sr.innerHTML=''; sc.style.display='none'; });
  }
}

    '<button class="sc" id="srch-clr-'+id+'">✕</button>'+

function wireOpts(){
  var hasTouch=('ontouchstart' in window);
  document.querySelectorAll('.opt').forEach(function(el){
    var v=el.getAttribute('data-val');
    if(hasTouch){
      var startY=0;
      el.addEventListener('touchstart',function(e){ startY=e.touches[0].clientY; },{passive:true});

        if(Math.abs(e.changedTouches[0].clientY - startY)>10) return;
        e.preventDefault();
        pick(v);

      el.addEventListener('click',function(){ pick(v); });

/* ─── pick() — router central ─── */
function pick(val){
  // Dir
  if(!S.dir && (val==='ent'||val==='sai'||val==='tra')){
    H.push('dir:'+val);
    if(val==='tra') showTransitAirport();
    else showOriginCountry(val);
    return;
  }
  // Transit airport
  if(S.dir==='tra' && !S.traApt){
    S.traApt=val;
    H.push('tra_apt:'+val);
    if(val==='same') showTransitDest();
    else { S.dir='ent'; showOriginCountry('ent'); } // outro aeroporto = passa fronteira
    return;
  }
  // Doc
  if(!S.doc){
    S.doc=val;
    H.push('doc:'+val);
    if(val==='tc') { showChip(); return; }
    if(val==='cr') { showCrewUniform(); return; }
    if(val==='di') { showResult(); return; } // diplomático → directo ao resultado
    showMinor(); return;
  }
  // Fam card
  if(S.doc==='fa' && S.famCard===undefined){
    S.famCard=val; H.push('fam:'+val); showMinor(); return;
  }
  // Chip
  if(S.doc==='tc' && S.chip===undefined){
    S.chip=val;
    H.push('chip:'+val);
    if(val==='n') { showResult(); return; }
    showNat(); return;
  }
  // Nat
  if(S.doc==='tc' && S.chip==='y' && !S.nat){
    S.nat=val; H.push('nat:'+val); showMinor(); return;
  }
  // Crew uniform
  if(S.doc==='cr' && S.crewUnif===undefined){
    S.crewUnif=val;
    H.push('crew_unif:'+val);
    if(val==='n') { showResult(); return; }
    showCrewID(); return;
  }
  // Crew ID
  if(S.doc==='cr' && S.crewUnif==='y' && S.crewID===undefined){
    S.crewID=val; H.push('crew_id:'+val); showResult(); return;
  }
  // Minor
  if(S.minor===undefined){
    S.minor=val;
    H.push('minor:'+val);
    if(val==='minor') { showMinorAlone(); return; }
    showResult(); return;
  }
  // Sub-pergunta do menor
  if(S.minorAlone===undefined && S.minor==='minor'){
    S.minorAlone=val;
    H.push('minor_alone:'+val);
    showResult(); return;
  }
}

/* ─── goBack ─── */
function goBack(){
  if(H.length===0){ showLang(); return; }

  // Remover última entrada do H e desfazer o estado correspondente
  var last = H.pop();
  var p=last.split(':'), k=p[0], v=p.slice(1).join(':');
  if(k==='dir')         { delete S.dir; }
  if(k==='orig')        { delete S.originCountry; }
  if(k==='tra_apt')     { delete S.traApt; }
  if(k==='tradest')     { delete S.transitDest; }
  if(k==='doc')         { delete S.doc; }
  if(k==='chip')        { delete S.chip; }
  if(k==='nat')         { delete S.nat; }
  if(k==='crew_unif')   { delete S.crewUnif; }
  if(k==='crew_id')     { delete S.crewID; }
  if(k==='minor')       { delete S.minor; }
  if(k==='minor_alone') { delete S.minorAlone; }

  if(H.length===0){ showDir(); return; }

  // Determinar que ecrã mostrar com base na última entrada do H
  var prev = H[H.length-1];
  var pk = prev.split(':')[0];
  switch(pk){
    case 'dir':
      var d=prev.split(':')[1];
      if(d==='tra') showTransitAirport();
      else showOriginCountry(d);
      break;
    case 'orig':      showDoc(); break;
    case 'tra_apt':   showTransitDest(); break;
    case 'doc':
      var doc=prev.split(':')[1];
      if(doc==='fa') showFamCard();
      else if(doc==='tc') showChip();
      else if(doc==='cr') showCrewUniform();
      else showMinor();
      break;
    case 'chip':
      var ch=prev.split(':')[1];
      if(ch==='y') showNat(); else showMinor();
      break;
    case 'nat':       showMinor(); break;
    case 'crew_unif': showCrewID(); break;
    case 'minor':
      var mi=prev.split(':')[1];
      if(mi==='minor') showMinorAlone(); else showResult();
      break;
    default: showDir();
  }
}

/* ─── Resultado ─── */
function step(n,a,d){ return '<div class="rstep"><div class="rn">'+n+'</div><div><div class="ra">'+a+'</div><div class="rd">'+d+'</div></div></div>'; }

function showResult(){
  prog(TOTAL_STEPS);
  var dir=S.dir||'ent', doc=S.doc||'', chip=S.chip||'', nat=S.nat||'',
      fam=S.famCard||'', minor=S.minor||'', crewUnif=S.crewUnif||'', crewID=S.crewID||'';
  var isExit=(dir==='sai');
  var steps='', eq='', qb='', alerts='';

  // ── Menor não acompanhado (minor=minor + minorAlone=alone) ──
  if(S.minor==='minor' && S.minorAlone==='alone'){
    steps=step(1,t('s_box'),t('s_boxd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    alerts='<div class="al-w">'+t('al_unaccomp')+'</div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
  }
  // ── Tripulação ──
  else if(doc==='cr'){
    if(crewUnif==='y' && crewID==='y'){
      steps=step(1,t('s_crew'),t('s_crewd'));
      eq='<div class="eq eq-gr">'+eqImg('bx')+'<div><div class="eqt">'+t('dcrew')+'</div><div class="eqs">'+t('dcrews')+'</div></div></div>';
      qb='<div class="qb qb-crew">'+t('qcrew')+'</div>';
      alerts='<div class="al-i">'+t('al_crew_only1')+' '+t('al_crew_only2')+'</div>';
    } else if(crewUnif==='n'||crewID==='n'){
      steps=step(1,t('s_box'),t('s_boxd'));
      eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
      alerts='<div class="al-w">'+t('al_crew_noconf')+'</div>';
      qb='<div class="qb qb-all">'+t('qal')+'</div>';
    }
  }
  // ── Diplomático / Serviço / NATO ──
  // Todos vão ao balcão manual para obter isenção EES
  // Sem SSK independentemente da nacionalidade
  else if(doc==='di'){
    steps=step(1,t('s_box'),t('s_dip_d'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
    alerts='<div class="al-i">'+t('al_dip')+'</div>';
  }
  // ── UE ──
  else if(doc==='ue'){
    if(minor==='minor'||(minor!=='minor'&&false)){
      // menor (tratado abaixo via flag minor)
    }
    var isMinor=(minor==='minor');
    var lim=isExit?18:16;
    if(isMinor){
      steps=step(1,t('s_box_eu'),t('s_box_eud'));
      eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
      alerts='<div class="al-m">'+(isExit?t('al_minor_sai'):t('al_minor_ent'))+'</div>';
    } else {
      steps=step(1,t('s_egate'),t('s_egated'));
      eq='<div class="eq eq-g">'+eqImg('eg')+'<div><div class="eqt">'+t('deg')+'</div><div class="eqs">'+t('degs')+'</div></div></div>';
    }
    qb='<div class="qb qb-eu">'+t('qeu')+'</div>';
  }
  // ── Título Residência ──
  else if(doc==='re'){
    steps=step(1,t('s_box'),t('s_boxd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
    if(minor==='minor') alerts='<div class="al-m">'+(isExit?t('al_minor_sai'):t('al_minor_ent'))+'</div>';
  }

  // ── TCE sem chip ──
  else if(doc==='tc' && chip==='n'){
    steps=step(1,t('s_box'),t('s_boxd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
    alerts='<div class="al-i">'+t('al_nochip')+'</div>';
  }
  // ── TCE com chip ──
  else if(doc==='tc' && chip==='y'){
    var isEgate=(nat==='ee'||nat==='es');
    var isMinor=(minor==='minor');
    if(isEgate && !isMinor){
      steps=step(1,isExit?t('s_ssk_exit'):t('s_ssk'),isExit?t('s_ssk_exitd'):t('s_sskd'))+step(2,t('s_egate2'),t('s_egate2d'));
      eq='<div class="eq eq-g">'+eqImg('sk_eg')+'<div><div class="eqt">'+t('dsg')+'</div><div class="eqs">'+t('dsgs')+'</div></div></div>';
    } else {
      steps=step(1,isExit?t('s_ssk_exit'):t('s_ssk'),isExit?t('s_ssk_exitd'):t('s_sskd'))+step(2,t('s_box2'),t('s_box2d'));
      eq='<div class="eq eq-a">'+eqImg('sk_bx')+'<div><div class="eqt">'+t('dsb')+'</div><div class="eqs">'+t('dsbs')+'</div></div></div>';
      qb='<div class="qb qb-all">'+t('qal')+'</div>';
    }
    if(isMinor) alerts='<div class="al-m">'+(isExit?t('al_minor_sai'):t('al_minor_ent'))+'</div>';
  }
  else {
    steps=step(1,t('s_box'),t('s_boxd'));
    eq='<div class="eq eq-b">'+eqImg('bx')+'<div><div class="eqt">'+t('dbo')+'</div><div class="eqs">'+t('dbos')+'</div></div></div>';
    qb='<div class="qb qb-all">'+t('qal')+'</div>';
  }

  var h='<div class="rc"><div class="rt">'+t('yr')+'</div>'+steps+eq+qb+alerts+'</div>';
  h+='<div class="btn2"><button class="btn" id="btn-back">'+t('bk')+'</button><button class="btn btnp" id="btn-restart">'+t('br')+'</button></div>';
  set(h);
  wireBack();
  var br=document.getElementById('btn-restart');
  if(br){
    var _hasTouch=('ontouchstart' in window);
    if(_hasTouch){
      br.addEventListener('touchend',function(e){ e.preventDefault(); restart(); });
    } else {
      br.addEventListener('click',restart);
    }
  }
}

/* ─── Atalho rápido por país (da search na língua) ─── */
function quickRouteFromCountry(c, defaultDir){
  S={}; H=[];
  S.dir=defaultDir;
  H.push('dir:'+defaultDir);
  if(c.sch){ showNoBorder('no_border_sub'); return; }
  S.originCountry=c;
  H.push('orig:'+c.en);
  showDoc();
}

function restart(){ S={}; H=[]; showLang(); }

// Init
showLang();
